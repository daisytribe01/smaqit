name: E2E Testing (Automated)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_case:
        description: 'Test case to run (e.g., mario-hello.automated)'
        required: false
        default: 'mario-hello.automated'
        type: string

jobs:
  e2e-test:
    name: End-to-End Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Go (for smaqit installer build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js (for Copilot CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      
      - name: Set up Python (for SDK)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Copilot SDK
        run: pip install -r .github/scripts/requirements.txt
      
      - name: Fix SDK CLI permissions
        run: |
          # Find and make SDK's bundled CLI executable
          CLI_PATH=$(python -c "import copilot; import os; print(os.path.join(os.path.dirname(copilot.__file__), 'bin', 'copilot'))" 2>/dev/null || echo "")
          if [ -n "$CLI_PATH" ] && [ -f "$CLI_PATH" ]; then
            chmod +x "$CLI_PATH"
            echo "✓ Made SDK CLI executable: $CLI_PATH"
          fi
      
      - name: Verify Copilot CLI setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Copilot CLI Diagnostics ==="
          
          # Check CLI installation
          echo "CLI version:"
          copilot --version || echo "❌ copilot command not found"
          
          # Check which CLI binary
          echo -e "\nCLI location:"
          which copilot || echo "❌ CLI not in PATH"
          
          # Check SDK installation
          echo -e "\nSDK version:"
          python -c "import copilot; print(f'SDK version: {copilot.__version__}')" || echo "❌ SDK not installed"
          
          # Check token availability
          echo -e "\nToken check:"
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "✓ GITHUB_TOKEN is set (length: ${#GITHUB_TOKEN})"
          else
            echo "❌ GITHUB_TOKEN is not set"
          fi
          
          # Try to check if token has Copilot access (this might fail, that's ok)
          echo -e "\nTesting Copilot CLI authentication:"
          timeout 10s copilot chat --help 2>&1 | head -20 || echo "⚠️  CLI help/auth check timed out or failed"
          
          echo "=== End Diagnostics ==="
      
      - name: Run E2E test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_CASE: ${{ github.event.inputs.test_case || 'mario-hello.automated' }}
        run: python .github/scripts/run_e2e_test.py "$TEST_CASE"
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: docs/user-testing/*ci-test-report.md
          if-no-files-found: ignore
          retention-days: 30
