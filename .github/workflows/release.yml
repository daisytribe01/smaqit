name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.3.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git describe

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: installer/go.sum

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if triggered manually
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists on remote, skipping tag creation"
          else
            git tag "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "Created and pushed tag $VERSION"
          fi

      - name: Build all platforms
        working-directory: installer
        run: |
          echo "Building smaqit ${{ steps.version.outputs.VERSION }}..."
          
          # Prepare embedded files (required for go:embed)
          make prepare
          
          # Build for all platforms with version embedded
          VERSION=${{ steps.version.outputs.VERSION }} make build-all
          
          echo "Build complete. Binaries:"
          ls -la dist/

      - name: Generate checksums
        working-directory: installer/dist
        run: |
          echo "Generating SHA256 checksums..."
          sha256sum smaqit_* > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # Extract section for this version from CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            # Try to extract the section for this version
            SECTION=$(sed -n "/^## \[${VERSION#v}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
            
            if [ -n "$SECTION" ]; then
              echo "$SECTION" > release_notes.txt
              echo "✓ Extracted release notes from CHANGELOG.md"
            else
              # Fallback: try Unreleased section
              UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | sed '$d')
              if [ -n "$UNRELEASED" ] && [ "$UNRELEASED" != "## [Unreleased]" ]; then
                echo "$UNRELEASED" > release_notes.txt
                echo "⚠ Using Unreleased section from CHANGELOG.md"
              else
                echo "Release $VERSION" > release_notes.txt
                echo "⚠ No changelog entry found, using default"
              fi
            fi
          else
            # CHANGELOG.md doesn't exist, try tag annotation
            TAG_MESSAGE=$(git tag -l --format='%(contents)' $VERSION 2>/dev/null || echo "")
            if [ -z "$TAG_MESSAGE" ]; then
              TAG_MESSAGE="Release $VERSION"
            fi
            echo "$TAG_MESSAGE" > release_notes.txt
            echo "⚠ No CHANGELOG.md, using tag annotation"
          fi
          
          echo "Release notes:"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            installer/dist/smaqit_linux_amd64
            installer/dist/smaqit_darwin_amd64
            installer/dist/smaqit_darwin_arm64
            installer/dist/smaqit_windows_amd64.exe
            installer/dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
